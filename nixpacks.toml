[variables]
NIXPACKS_NODE_VERSION = "20"

[phases.install]
cmds = ['npm install -g pnpm@9 && pnpm install --no-frozen-lockfile']

[phases.build]
cmds = ['cd artifacts/bara && npx expo export --platform web --clear --output-dir ../api-server/static-build && cd ../../ && pnpm --filter @workspace/api-server run build']

[start]
cmd = 'node artifacts/api-server/dist/index.mjs'
