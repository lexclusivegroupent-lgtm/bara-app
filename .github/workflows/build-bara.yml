name: Build Bara Static Bundle

on:
  push:
    branches: [main]
    paths-ignore:
      - 'artifacts/bara/static-build/**'

jobs:
  build-static:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Use the versioned action instead of `npm install -g pnpm@latest`
      # so the version is pinned and reproducible.
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      # Install from the WORKSPACE ROOT so that catalog: and workspace:*
      # references in artifacts/bara/package.json resolve correctly.
      # Running `pnpm install` inside a sub-package in isolation breaks
      # those protocols.
      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      # The build script now calls `expo export --platform web` — a single
      # headless command that finishes and exits. No Metro dev server needed.
      - name: Build Expo web export
        working-directory: artifacts/bara
        env:
          # Expo Router uses this as the server origin for links/deep-links.
          # Set to your production domain or leave as a placeholder for now.
          EXPO_PUBLIC_DOMAIN: app.baraapp.se
          NODE_ENV: production
          CI: true
        run: node scripts/build.js

      - name: Commit and push static-build
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add artifacts/bara/static-build/
          git diff --staged --quiet \
            && echo "No changes to commit" \
            || git commit -m "chore: rebuild Expo static bundle [skip ci]"
          git push
