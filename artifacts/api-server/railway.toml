# This file is used when Railway's service root directory is set to artifacts/api-server/
# All paths here are relative to artifacts/api-server/

[build]
builder = "DOCKERFILE"
# The Dockerfile at the repo root handles the full monorepo build:
# copies lib/ and artifacts/api-server/, installs all dependencies, and builds the api-server.

[deploy]
# dist/index.mjs is relative to artifacts/api-server/ (the service root)
startCommand = "node dist/index.mjs"
healthcheckPath = "/api/healthz"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
