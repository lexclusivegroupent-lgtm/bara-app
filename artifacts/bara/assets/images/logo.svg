<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <circle cx="100" cy="100" r="100" fill="#1B2B4B"/>
  <g fill="#DAA520">
    <!-- Truck body -->
    <rect x="28" y="85" width="88" height="52" rx="5"/>
    <!-- Truck cab -->
    <rect x="116" y="98" width="56" height="39" rx="5"/>
    <!-- Cab window -->
    <rect x="120" y="103" width="24" height="18" rx="3" fill="#1B2B4B" opacity="0.6"/>
    <!-- Cargo stripes -->
    <rect x="44" y="95" width="4" height="32" rx="1" fill="#1B2B4B" opacity="0.3"/>
    <rect x="56" y="95" width="4" height="32" rx="1" fill="#1B2B4B" opacity="0.3"/>
    <rect x="68" y="95" width="4" height="32" rx="1" fill="#1B2B4B" opacity="0.3"/>
    <rect x="80" y="95" width="4" height="32" rx="1" fill="#1B2B4B" opacity="0.3"/>
    <rect x="92" y="95" width="4" height="32" rx="1" fill="#1B2B4B" opacity="0.3"/>
    <!-- Connector between cab and body -->
    <rect x="112" y="95" width="8" height="42" fill="#DAA520"/>
    <!-- Front bumper/nose -->
    <rect x="168" y="112" width="8" height="20" rx="3"/>
    <!-- Exhaust stack -->
    <rect x="155" y="78" width="6" height="22" rx="2"/>
    <rect x="152" y="76" width="12" height="5" rx="2"/>
    <!-- Left rear wheel -->
    <circle cx="55" cy="140" r="14" fill="#1B2B4B"/>
    <circle cx="55" cy="140" r="14" fill="none" stroke="#DAA520" stroke-width="4"/>
    <circle cx="55" cy="140" r="6" fill="#DAA520"/>
    <!-- Right rear wheel -->
    <circle cx="90" cy="140" r="14" fill="#1B2B4B"/>
    <circle cx="90" cy="140" r="14" fill="none" stroke="#DAA520" stroke-width="4"/>
    <circle cx="90" cy="140" r="6" fill="#DAA520"/>
    <!-- Front wheel -->
    <circle cx="148" cy="140" r="14" fill="#1B2B4B"/>
    <circle cx="148" cy="140" r="14" fill="none" stroke="#DAA520" stroke-width="4"/>
    <circle cx="148" cy="140" r="6" fill="#DAA520"/>
    <!-- Speed lines -->
    <line x1="18" y1="95" x2="8" y2="95" stroke="#DAA520" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
    <line x1="20" y1="105" x2="6" y2="105" stroke="#DAA520" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
    <line x1="22" y1="115" x2="10" y2="115" stroke="#DAA520" stroke-width="3" stroke-linecap="round" opacity="0.3"/>
  </g>
</svg>
